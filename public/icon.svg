<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#06b6d4" /> <!-- cyan-500 -->
      <stop offset="50%" stopColor="#2563eb" /> <!-- blue-600 -->
      <stop offset="100%" stopColor="#7e22ce" /> <!-- purple-700 -->
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#60a5fa" /> <!-- blue-400 -->
      <stop offset="100%" stopColor="#4f46e5" /> <!-- indigo-600 -->
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#0F0121" />

  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#22d3ee" stroke-width="8" opacity="0.2" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#g1)" stroke-width="12" stroke-dasharray="180 1200" stroke-linecap="round" />

  <!-- 3D Box Layers -->
  <g transform="translate(256 256) rotate(-3) translate(-256 -256)">
    <rect x="128" y="128" width="256" height="256" rx="48" fill="url(#g2)" opacity="0.7" />
  </g>
  <g transform="translate(256 256) rotate(3) translate(-256 -256)">
    <rect x="128" y="128" width="256" height="256" rx="48" fill="url(#g1)" />
  </g>

  <!-- BookOpen icon - Neon Version -->
  <g transform="translate(136, 136) scale(10)" stroke-width="1.5">
    <!-- Left cover - Neon Cyan -->
    <path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292V6.042z" fill="#06b6d4" stroke="#22d3ee" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Right cover - Neon Purple -->
    <path d="M12 6.042a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292V6.042z" fill="#9333ea" stroke="#a855f7" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Center binding line -->
    <path d="M12 6.042v14.25" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
