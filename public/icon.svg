<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#06b6d4" /> <!-- cyan-500 -->
      <stop offset="50%" stopColor="#2563eb" /> <!-- blue-600 -->
      <stop offset="100%" stopColor="#7e22ce" /> <!-- purple-700 -->
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#60a5fa" /> <!-- blue-400 -->
      <stop offset="100%" stopColor="#4f46e5" /> <!-- indigo-600 -->
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#0F0121" />

  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#22d3ee" stroke-width="8" opacity="0.2" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#g1)" stroke-width="12" stroke-dasharray="180 1200" stroke-linecap="round" />

  <!-- 3D Box Layers -->
  <g transform="translate(256 256) rotate(-3) translate(-256 -256)">
    <rect x="128" y="128" width="256" height="256" rx="48" fill="url(#g2)" opacity="0.7" />
  </g>
  <g transform="translate(256 256) rotate(3) translate(-256 -256)">
    <rect x="128" y="128" width="256" height="256" rx="48" fill="url(#g1)" />
  </g>

  <!-- BookOpen icon from Lucide -->
  <g transform="translate(144, 144) scale(9.3333)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
  </g>
</svg>
